<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f9;
        }

        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <h2>تسجيل الدخول</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">دخول</button>
</form>

<p>مازال ما عندكش حساب؟ <a href="{% url 'register' %}">تسجيل حساب جديد</a></p>
</body>

</html>
